spring:
  datasource:
    # 数据库连接配置，学习阶段可先使用本地 MySQL
    url: jdbc:mysql://localhost:3306/springboot_demo?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    # JPA 的自动建表策略，方便新手快速体验数据库操作
    hibernate:
      ddl-auto: update
    show-sql: true

  redis:
    # Redis 配置，后续可以用于缓存和分布式锁练习
    host: localhost
    port: 6379
    password: ""

  spring:
    rocketmq:
      # RocketMQ 配置，实际运行时需要替换为你的 NameServer 地址
      name-server: localhost:9876
      producer:
        group: demo-producer-group
      consumer:
        group: demo-consumer-group

server:
  port: 8080

logging:
  level:
    # 日志级别设置，便于观察框架运行过程
    root: info
    com.example.demo: debug
